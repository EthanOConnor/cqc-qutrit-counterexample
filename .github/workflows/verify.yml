name: Verify certificate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python certificates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run exact SymPy certificate
        run: python scripts/verify_cqc_exact.py

      - name: Run NumPy certificate
        run: python scripts/verify_cqc_numpy.py

      - name: Run high-precision mpmath certificate
        run: python scripts/verify_cqc_mpmath.py
